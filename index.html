<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xây dựng trang web FPT Polytechnic</title>

<style>
    body {
        background: #eaeaea;
        font-family: Arial, sans-serif;
    }

    .browser {
        width: 650px;
        margin: 60px auto;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        background: white;
    }

    /* Thanh trình duyệt */
    .top-bar {
        background: #f4c542;
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .dots {
        display: flex;
        gap: 6px;
    }

    .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
    }

    .red { background: #ff5f57; }
    .yellow { background: #ffbd2e; }
    .green { background: #28c840; }

    .title {
        flex: 1;
        text-align: center;
        font-weight: bold;
    }

    /* Nội dung */
    .content {
        padding: 20px;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo img {
        height: 40px;
    }

    .logo span {
        color: orange;
        font-weight: bold;
        font-size: 20px;
    }

    hr {
        margin: 15px 0;
    }

    h1 {
        font-size: 22px;
        font-weight: bold;
    }

    .main-content {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }

    .main-content img {
        width: 120px;
    }

    .main-content p {
        font-size: 14px;
        line-height: 1.5;
    }
</style>

</head>

<body>

<div class="browser">

    <!-- Thanh trình duyệt -->
    <div class="top-bar">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="title">FPT Polytechnic</div>
    </div>

    <!-- Nội dung -->
    <div class="content">

        <div class="logo">
            <img src="src/logo-fpt-polytechnic_043151471.png" alt="FPT Education">
            <span>FPT POLYTECHNIC</span>
        </div>

        <hr>

        <h1>XÂY DỰNG TRANG WEB</h1>

        <div class="main-content">
            <img src="src/-7338-1682479594.jpg" alt="Sinh viên FPT">

            <p>
                FPT Polytechnic hân hạnh chào đón các bạn đến với môn học xây dựng trang web.
                Kết thúc môn học này bạn có thể tự xây dựng cho mình một website tĩnh
                dựa trên kiến thức HTML & CSS.
            </p>
        </div>

    </div>

</div>

</body>
</html>
